name: Release binaries

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # needed to upload to the Release

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cli_artefact: pca-linux-x64
            gui_artefact: pca-gui-linux-x64
            cli_exe: dist/pca
            gui_exe: dist/pca-gui
          - os: windows-latest
            cli_artefact: pca-windows-x64
            gui_artefact: pca-gui-windows-x64
            cli_exe: dist/pca.exe
            gui_exe: dist/pca-gui.exe
          - os: macos-latest
            cli_artefact: pca-macos-universal
            gui_artefact: pca-gui-macos-universal
            cli_exe: dist/pca
            gui_exe: dist/pca-gui
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Apt deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y lshw libegl1 libxkbcommon0 libdbus-1-3

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[packaging,web,gui,dev]"

      - name: Build CLI (pca)
        run: python -m PyInstaller packaging/pca.spec --clean --noconfirm

      - name: Build GUI (pca-gui)
        run: python -m PyInstaller packaging/pca-gui.spec --clean --noconfirm

      - name: Smoke CLI (--help)
        shell: bash
        run: |
          "${{ matrix.cli_exe }}" --help | head -n 5

      - name: Smoke CLI (recommend against KGR)
        shell: bash
        run: |
          "${{ matrix.cli_exe }}" recommend \
            --stub tests/data/inventories/rig_mid.json \
            --market tests/data/market_snapshots/snapshot_normal.json \
            --budget 800 --strategy greedy | head -n 20

      - name: Smoke GUI (import only, headless)
        shell: bash
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          # We can't launch a full event loop on macOS/Windows headless
          # runners in CI, but we can sanity-check that the frozen bundle
          # imports all submodules and instantiates the controller.
          python - <<'PY'
          import subprocess, sys
          # Re-exec the CLI to verify the bundle is well-formed.
          r = subprocess.run(["${{ matrix.cli_exe }}", "inventory",
                              "--stub", "tests/data/inventories/rig_mid.json"],
                             capture_output=True, text=True, timeout=30)
          print(r.stdout[:500])
          sys.exit(r.returncode)
          PY

      - name: Rename artefacts
        shell: bash
        run: |
          mkdir -p out
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cp "${{ matrix.cli_exe }}" "out/${{ matrix.cli_artefact }}.exe"
            cp "${{ matrix.gui_exe }}" "out/${{ matrix.gui_artefact }}.exe"
          else
            cp "${{ matrix.cli_exe }}" "out/${{ matrix.cli_artefact }}"
            cp "${{ matrix.gui_exe }}" "out/${{ matrix.gui_artefact }}"
            chmod +x "out/${{ matrix.cli_artefact }}" "out/${{ matrix.gui_artefact }}"
          fi

      - name: Upload CLI artefact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.cli_artefact }}
          path: out/${{ matrix.cli_artefact }}*
          if-no-files-found: error

      - name: Upload GUI artefact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.gui_artefact }}
          path: out/${{ matrix.gui_artefact }}*
          if-no-files-found: error

  publish:
    name: attach to GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artefacts
          merge-multiple: true
      - name: List artefacts
        run: ls -la artefacts
      - name: Create / update Release
        uses: softprops/action-gh-release@v2
        with:
          files: artefacts/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
